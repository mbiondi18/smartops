apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: smartops-monitor
  namespace: monitoring
  labels:
    release: monitoring
spec:
  namespaceSelector:
    any: true
  selector:
    matchLabels:
      app: smartops-app
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
