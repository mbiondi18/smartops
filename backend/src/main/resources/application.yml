spring:
  application:
    name: smartops-hub

  datasource:
    url: jdbc:postgresql://localhost:5432/smartops
    username: smartops
    password: smartops123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

anthropic:
  api:
    key: ${ANTHROPIC_API_KEY:placeholder}
    enabled: ${ANTHROPIC_API_ENABLED:false}
    model: ${ANTHROPIC_MODEL:claude-haiku-4-5-20251001}

ai:
  analysis:
    interval: 3600000  # 1 hour in ms

logging:
  level:
    com.smartops: DEBUG
    org.springframework.web: INFO
